services:
  - type: web
    name: habitflow-platform-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHONPATH
        value: src
      - key: APP_NAME
        value: HabitFlow API
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: POSTGRES_HOST
        sync: false
      - key: POSTGRES_PORT
        value: "5432"
      - key: POSTGRES_DB
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_SSLMODE
        value: require
      - key: MONGO_URI
        sync: false
      - key: MONGO_DATABASE
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "120"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: GOOGLE_WEB_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: OBJECT_STORAGE_PROVIDER
        value: r2
      - key: OBJECT_STORAGE_BUCKET
        sync: false
      - key: OBJECT_STORAGE_ENDPOINT
        sync: false
      - key: OBJECT_STORAGE_ACCESS_KEY
        sync: false
      - key: OBJECT_STORAGE_SECRET_KEY
        sync: false
      - key: OBJECT_STORAGE_REGION
        value: auto
      - key: LLM_TYPE
        value: local
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_URL
        sync: false
      - key: LLM_BASE_URL
        value: https://api.openai.com/v1
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gpt-5.5
      - key: STT_BASE_URL
        value: https://api.openai.com/v1
      - key: STT_API_KEY
        sync: false
      - key: STT_MODEL
        value: whisper-1
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_ADMIN_DOCUMENT_ID
        sync: false
